stdout_logfile=/var/log/supervisor/worker-audit-log.log
stopwaitsecs=15

[program:worker-dlq]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/artisan docintern:consume dead-letters --sleep=10 --tries=1 --timeout=60
autostart=true
